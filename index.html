<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhân Số Học</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow">
        <h1 class="text-2xl font-bold mb-4 text-center">
            🔮 Thông tin của bạn
        </h1>

        <input id="name" class="w-full border p-2 mb-3 rounded" placeholder="Họ tên">

        <input id="dob" type="date" class="w-full border p-2 mb-3 rounded">

        <button onclick="submitData()" class="w-full bg-blue-500 text-white p-2 rounded">
            Tính toán
        </button>

        <div id="loading" class="text-center mt-3 hidden">
            ⏳ Đang xử lý...
        </div>

        <div id="result" class="mt-5"></div>
    </div>
    
    <!-- Lưu dữ liệu log vào Googlesheet -->
    <script src="save-log.js"></script>
    <!-- ..... -->
    <script src="app.js"></script>
</body>
</html>
