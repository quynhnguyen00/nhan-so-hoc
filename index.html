<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhân Số Học</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen">

    <div class="max-w-2xl mx-auto px-4 py-10">
        <div class="bg-white rounded-3xl shadow-2xl p-8">

            <h1 class="text-4xl font-extrabold text-center text-purple-600 mb-2">
                🔮 Nhân Số Học
            </h1>

            <p class="text-center text-gray-500 mb-8">
                Khám phá các con số đặc biệt của bạn
            </p>

            <!-- FORM -->
            <form onsubmit="event.preventDefault(); submitData();">

                <!-- Họ tên -->
                <div class="mb-6">
                    <label for="name" class="block mb-2 font-semibold text-gray-700">
                        👤 Họ và tên
                    </label>

                    <input
                        id="name"
                        type="text"
                        required
                        autocomplete="name"
                        placeholder="Nhập họ tên đầy đủ"
                        class="w-full px-5 py-4 text-lg border-2 border-purple-200 rounded-2xl
                               focus:border-purple-500 focus:ring-4 focus:ring-purple-200
                               outline-none transition"
                    >
                </div>

                <!-- Ngày sinh nhập tay -->
                <div class="mb-6">
                    <label for="dob" class="block mb-2 font-semibold text-gray-700">
                        📅 Ngày tháng năm sinh
                    </label>

                    <input
                        id="dob"
                        name="dob"
                        type="text"
                        inputmode="numeric"
                        maxlength="10"
                        autocomplete="bday"
                        placeholder="dd/mm/yyyy"
                        required
                        class="w-full px-5 py-4 text-lg border-2 border-purple-200 rounded-2xl
                               focus:border-purple-500 focus:ring-4 focus:ring-purple-200
                               outline-none transition"
                    >
                </div>

                <!-- Nút tính toán -->
                <button
                    type="submit"
                    class="w-full bg-gradient-to-r from-purple-500 to-blue-500
                           hover:from-purple-600 hover:to-blue-600
                           text-white text-lg font-bold py-4 rounded-2xl
                           shadow-lg hover:shadow-xl transition duration-300"
                >
                    ✨ Tính Toán Ngay
                </button>
            </form>

            <!-- Loading -->
            <div id="loading" class="hidden text-center mt-6">
                <div class="inline-flex items-center gap-2 text-purple-600 font-semibold">
                    <span class="animate-spin text-2xl">⏳</span>
                    Đang phân tích...
                </div>
            </div>

            <!-- Kết quả -->
            <div id="result" class="mt-8"></div>

        </div>
    </div>

    <!-- Tự động thêm dấu / -->
    <script>
        document.getElementById("dob").addEventListener("input", function (e) {
            let value = e.target.value.replace(/\D/g, "");

            if (value.length > 8) {
                value = value.substring(0, 8);
            }

            if (value.length >= 5) {
                value = value.replace(
                    /^(\d{2})(\d{2})(\d{0,4}).*/,
                    "$1/$2/$3"
                );
            } else if (value.length >= 3) {
                value = value.replace(
                    /^(\d{2})(\d{0,2}).*/,
                    "$1/$2"
                );
            }

            e.target.value = value;
        });
    </script>

    <!-- Scripts -->
    <script src="numerology/utils.js"></script>
    <script src="numerology/life-path.js"></script>
    <script src="numerology/soul-urge.js"></script>
    <script src="numerology/expression.js"></script>
    <script src="numerology/birthday.js"></script>
    <script src="numerology/meanings.js"></script>
    <script src="save-log.js"></script>
    <script src="app.js"></script>

</body>
</html>
