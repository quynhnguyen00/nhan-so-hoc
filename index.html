<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nhân Số Học</title>

  <!-- KẾT NỐI SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Tính số đường đời</h2>

<input type="text" id="name" placeholder="Nhập tên">
<input type="date" id="dob">
<button onclick="calculate()">Tính</button>

<p id="result"></p>

<script>
// =======================
// 1. KẾT NỐI DATABASE
// =======================
const supabase = window.supabase.createClient(
  "https://ynpsvfzxwpnsedunxivh.supabase.co/rest/v1/",
  "postgresql://postgres.ynpsvfzxwpnsedunxivh:Quynh%401001...@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true"
);

// =======================
// 2. HÀM TÍNH TOÁN
// =======================
function reduceNumber(num) {
  while (num > 9) {
    num = num.toString().split('').reduce((a, b) => a + Number(b), 0);
  }
  return num;
}

// =======================
// 3. HÀM CHÍNH
// =======================
async function calculate() {

  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;

  if (!dob) {
    alert("Vui lòng nhập ngày sinh");
    return;
  }

  // tính toán
  const digits = dob.replaceAll("-", "").split('');
  const sum = digits.reduce((a, b) => a + Number(b), 0);
  const result = reduceNumber(sum);

  // hiển thị
  document.getElementById("result").innerText = "Số của bạn: " + result;

  // =======================
  // 4. LƯU DATABASE
  // =======================
  const { data, error } = await supabase
    .from("users")
    .insert([
      {
        name: name || "User",
        dob: dob,
        result: result
      }
    ]);

  if (error) {
    console.error("Lỗi:", error);
    alert("Lưu thất bại");
  } else {
    console.log("Đã lưu:", data);
  }
}
</script>

</body>
</html>
