<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nhân Số Học</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Tính số đường đời</h2>

<input type="text" id="name" placeholder="Nhập tên">
<input type="date" id="birthdate">

<button onclick="saveData()">Lưu</button>

<p id="result"></p>

<script>
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const { data, error } = await supabase
  .from("users")
  .select("*");

console.log(data, error);

// Hàm tính số đường đời
function calculateLifeNumber(date) {
  let sum = date.replaceAll("-", "").split("").reduce((a, b) => a + Number(b), 0);

  while (sum > 9) {
    sum = sum.toString().split("").reduce((a, b) => a + Number(b), 0);
  }

  return sum;
}

// Hàm lưu dữ liệu
async function saveData() {
  const name = document.getElementById("name").value;
  const birthdate = document.getElementById("birthdate").value;

  if (!name || !birthdate) {
    alert("Nhập đầy đủ thông tin");
    return;
  }

  const lifeNumber = calculateLifeNumber(birthdate);

  const { data, error } = await supabaseClient
    .from("users")
    .insert([
      {
        name: name,
        birthdate: birthdate,
        life_number: lifeNumber
      }
    ]);

  if (error) {
    console.error(error);
    document.getElementById("result").innerText = "❌ Lỗi lưu dữ liệu";
  } else {
    document.getElementById("result").innerText =
      "✅ Đã lưu! Số đường đời: " + lifeNumber;
  }
}
</script>

</body>
</html>
